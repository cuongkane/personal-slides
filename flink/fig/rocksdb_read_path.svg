<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="rpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <marker id="rpArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0077bb"/>
    </marker>
    <filter id="rpShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="460" rx="12" fill="none"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" fill="#cc2244" font-size="14" font-weight="700">Read Path for "evt-88821"</text>

  <!-- Step 1: Memtable -->
  <rect x="40" y="55" width="320" height="65" rx="8" fill="#f5f5f5" stroke="#0077bb" stroke-width="1.5" filter="url(#rpShadow)"/>
  <circle cx="65" cy="80" r="14" fill="#e6f0f8" stroke="#0077bb" stroke-width="1.5"/>
  <text x="65" y="85" text-anchor="middle" fill="#0077bb" font-size="12" font-weight="700">1</text>
  <text x="90" y="80" fill="#0077bb" font-size="12" font-weight="600">Memtable (RAM)</text>
  <text x="90" y="100" fill="#444444" font-size="10">Most recent writes, sorted skip list</text>

  <!-- Miss indicator -->
  <rect x="390" y="65" width="100" height="30" rx="15" fill="#fdf0f2" stroke="#cc2244" stroke-width="1.5"/>
  <text x="440" y="85" text-anchor="middle" fill="#cc2244" font-size="11" font-weight="600">→ miss</text>

  <!-- Speed indicator -->
  <text x="520" y="85" fill="#666666" font-size="9">~nanoseconds</text>

  <!-- Arrow down -->
  <line x1="200" y1="120" x2="200" y2="145" stroke="#0077bb" stroke-width="2" marker-end="url(#rpArrow)" opacity="0.5"/>

  <!-- Step 2: Block Cache -->
  <rect x="40" y="150" width="320" height="65" rx="8" fill="#f5f5f5" stroke="#0077bb" stroke-width="1.5" filter="url(#rpShadow)"/>
  <circle cx="65" cy="175" r="14" fill="#e6f0f8" stroke="#0077bb" stroke-width="1.5"/>
  <text x="65" y="180" text-anchor="middle" fill="#0077bb" font-size="12" font-weight="700">2</text>
  <text x="90" y="175" fill="#0077bb" font-size="12" font-weight="600">Block Cache (RAM)</text>
  <text x="90" y="197" fill="#444444" font-size="10">LRU cache of SST data blocks</text>

  <!-- Miss indicator -->
  <rect x="390" y="160" width="190" height="30" rx="15" fill="#fdf0f2" stroke="#cc2244" stroke-width="1.5"/>
  <text x="485" y="180" text-anchor="middle" fill="#cc2244" font-size="11" font-weight="600">→ miss (first time)</text>

  <text x="610" y="180" fill="#666666" font-size="9">~microseconds</text>

  <!-- Arrow down -->
  <line x1="200" y1="215" x2="200" y2="240" stroke="#0077bb" stroke-width="2" marker-end="url(#rpArrow)" opacity="0.5"/>

  <!-- Step 3: Bloom Filters -->
  <rect x="40" y="245" width="700" height="105" rx="8" fill="#f5f5f5" stroke="#228833" stroke-width="1.5" filter="url(#rpShadow)"/>
  <circle cx="65" cy="270" r="14" fill="#eef8ee" stroke="#228833" stroke-width="1.5"/>
  <text x="65" y="275" text-anchor="middle" fill="#228833" font-size="12" font-weight="700">3</text>
  <text x="90" y="275" fill="#228833" font-size="12" font-weight="600">Bloom Filters (RAM, pinned permanently)</text>

  <!-- SST checks -->
  <rect x="70" y="290" width="210" height="24" rx="4" fill="#eef8ee" stroke="#228833" stroke-width="0.8"/>
  <text x="175" y="306" text-anchor="middle" fill="#228833" font-size="10">000001.sst: "NOT here" ✓ skip</text>

  <rect x="295" y="290" width="210" height="24" rx="4" fill="#eef8ee" stroke="#228833" stroke-width="0.8"/>
  <text x="400" y="306" text-anchor="middle" fill="#228833" font-size="10">000002.sst: "NOT here" ✓ skip</text>

  <rect x="520" y="290" width="210" height="24" rx="4" fill="#fdf0f2" stroke="#cc7700" stroke-width="1.2"/>
  <text x="625" y="306" text-anchor="middle" fill="#cc7700" font-size="10">000003.sst: "maybe here" ⚠</text>

  <text x="400" y="340" text-anchor="middle" fill="#666666" font-size="9">Bloom filters eliminate 99%+ of files without touching disk</text>

  <!-- Arrow down -->
  <line x1="200" y1="350" x2="200" y2="375" stroke="#0077bb" stroke-width="2" marker-end="url(#rpArrow)" opacity="0.5"/>

  <!-- Step 4: Disk Read -->
  <rect x="40" y="380" width="700" height="65" rx="8" fill="#f5f5f5" stroke="#cc7700" stroke-width="1.5" filter="url(#rpShadow)"/>
  <circle cx="65" cy="405" r="14" fill="#2a2a1a" stroke="#cc7700" stroke-width="1.5"/>
  <text x="65" y="410" text-anchor="middle" fill="#cc7700" font-size="12" font-weight="700">4</text>
  <text x="90" y="405" fill="#cc7700" font-size="12" font-weight="600">Disk Read — one 4 KB block from 000003.sst</text>
  <text x="90" y="425" fill="#444444" font-size="10">Block loaded into cache → searched → key not found</text>

  <!-- Result -->
  <rect x="530" y="395" width="190" height="30" rx="15" fill="#eef8ee" stroke="#228833" stroke-width="2"/>
  <text x="625" y="415" text-anchor="middle" fill="#228833" font-size="12" font-weight="700">→ First occurrence!</text>

  <text x="610" y="440" fill="#666666" font-size="9">~few milliseconds for SSD read</text>
</svg>