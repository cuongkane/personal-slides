<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="slBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <filter id="slShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="500" rx="12" fill="none"/>

  <!-- Title -->
  <rect x="20" y="15" width="740" height="42" rx="8" fill="#e8edf2" stroke="#228833" stroke-width="1.5"/>
  <text x="390" y="42" text-anchor="middle" fill="#228833" font-size="15" font-weight="700">Slot 4's Managed Memory: 2.5 GB</text>

  <!-- RocksDB Budget -->
  <rect x="30" y="75" width="720" height="410" rx="10" fill="#f5f5f5" stroke="#cc7700" stroke-width="1.5" filter="url(#slShadow)"/>
  <text x="50" y="100" fill="#cc7700" font-size="13" font-weight="700">RocksDB Budget: ~1.0 GB</text>
  <text x="310" y="100" fill="#555555" font-size="10">(allocated to all RocksDB instances in this slot)</text>

  <!-- Write Buffer Manager -->
  <rect x="50" y="120" width="690" height="100" rx="8" fill="#f0f0f0" stroke="#0077bb" stroke-width="1.5"/>
  <rect x="50" y="120" width="69" height="100" rx="8" fill="#e6f0f8" opacity="0.6"/>
  <text x="84" y="175" text-anchor="middle" fill="#0077bb" font-size="11" font-weight="700" transform="rotate(-90, 84, 175)">10%</text>
  <text x="150" y="145" fill="#0077bb" font-size="13" font-weight="600">Write Buffer Manager: ~100 MB</text>
  <text x="150" y="165" fill="#444444" font-size="10">The in-RAM memtable where all new writes land.</text>
  <text x="150" y="185" fill="#444444" font-size="10">Shared across Dedup[4]'s RocksDB AND Enrich[4]'s RocksDB.</text>

  <!-- Dedup + Enrich icons in Write Buffer -->
  <rect x="545" y="148" width="80" height="24" rx="4" fill="#e6f0f8" stroke="#cc7700" stroke-width="1"/>
  <text x="585" y="164" text-anchor="middle" fill="#cc7700" font-size="9">Dedup[4]</text>
  <rect x="635" y="148" width="80" height="24" rx="4" fill="#e6f0f8" stroke="#228833" stroke-width="1"/>
  <text x="675" y="164" text-anchor="middle" fill="#228833" font-size="9">Enrich[4]</text>
  <text x="620" y="195" text-anchor="middle" fill="#666666" font-size="9">← shared</text>

  <!-- Block Cache -->
  <rect x="50" y="235" width="690" height="235" rx="8" fill="#f0f0f0" stroke="#cc2244" stroke-width="1.5"/>
  <rect x="50" y="235" width="69" height="235" rx="8" fill="#fdf0f2" opacity="0.4"/>
  <text x="84" y="360" text-anchor="middle" fill="#cc2244" font-size="11" font-weight="700" transform="rotate(-90, 84, 360)">90%</text>
  <text x="150" y="260" fill="#cc2244" font-size="13" font-weight="600">Block Cache: ~900 MB</text>
  <text x="150" y="280" fill="#444444" font-size="10">LRU cache for SST data blocks read from disk. Shared across both RocksDB instances.</text>

  <!-- High Priority Pool -->
  <rect x="140" y="300" width="580" height="65" rx="6" fill="#f5f5f5" stroke="#cc7700" stroke-width="1"/>
  <text x="160" y="322" fill="#cc7700" font-size="11" font-weight="600">High Priority Pool: ~90 MB (10% of cache)</text>
  <text x="160" y="340" fill="#444444" font-size="10">Pinned index blocks and bloom filter blocks. Never evicted.</text>
  <text x="160" y="355" fill="#666666" font-size="9">This is what makes key lookups fast without touching disk.</text>

  <!-- Default Pool -->
  <rect x="140" y="380" width="580" height="75" rx="6" fill="#f5f5f5" stroke="#0077bb" stroke-width="1"/>
  <text x="160" y="402" fill="#0077bb" font-size="11" font-weight="600">Default Pool: ~810 MB (90% of cache)</text>
  <text x="160" y="422" fill="#444444" font-size="10">Data blocks containing your actual key-value pairs.</text>
  <text x="160" y="440" fill="#666666" font-size="9">Evicted least-recently-used when full.</text>
</svg>