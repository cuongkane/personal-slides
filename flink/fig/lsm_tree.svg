<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="lsmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <marker id="lsmArrow" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0077bb" opacity="0.6"/>
    </marker>
    <filter id="lsmShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="520" rx="12" fill="none"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#0077bb" font-size="14" font-weight="700">LSM-Tree: Data Flows Downward Over Time</text>

  <!-- RAM label -->
  <rect x="20" y="55" width="50" height="80" rx="6" fill="#e6f0f8" opacity="0.4"/>
  <text x="45" y="100" text-anchor="middle" fill="#0077bb" font-size="10" font-weight="600" transform="rotate(-90, 45, 100)">RAM</text>

  <!-- Memtable -->
  <rect x="100" y="60" width="400" height="65" rx="10" fill="#e6f0f8" stroke="#0077bb" stroke-width="2" filter="url(#lsmShadow)"/>
  <text x="300" y="85" text-anchor="middle" fill="#0077bb" font-size="14" font-weight="700">Memtable</text>
  <text x="300" y="105" text-anchor="middle" fill="#444444" font-size="11">~50 MB, sorted skip list, active writes</text>

  <!-- Arrow: flush -->
  <line x1="300" y1="125" x2="300" y2="155" stroke="#0077bb" stroke-width="2" marker-end="url(#lsmArrow)"/>
  <text x="365" y="145" fill="#cc7700" font-size="10" font-weight="600">↓ flush (background)</text>

  <!-- DISK label -->
  <rect x="20" y="155" width="50" height="340" rx="6" fill="#fdf0f2" opacity="0.3"/>
  <text x="45" y="330" text-anchor="middle" fill="#cc2244" font-size="10" font-weight="600" transform="rotate(-90, 45, 330)">DISK (SSD)</text>

  <!-- Level 0 -->
  <rect x="120" y="160" width="360" height="60" rx="8" fill="#f0f0f0" stroke="#cc7700" stroke-width="1.5" filter="url(#lsmShadow)"/>
  <text x="300" y="185" text-anchor="middle" fill="#cc7700" font-size="13" font-weight="600">Level 0</text>
  <text x="300" y="205" text-anchor="middle" fill="#444444" font-size="10">up to ~256 MB — recently flushed SSTs, may overlap</text>

  <!-- Arrow: compaction -->
  <line x1="300" y1="220" x2="300" y2="250" stroke="#0077bb" stroke-width="2" marker-end="url(#lsmArrow)"/>
  <text x="390" y="240" fill="#cc7700" font-size="10" font-weight="600">↓ compaction</text>

  <!-- Level 1 -->
  <rect x="100" y="255" width="400" height="60" rx="8" fill="#f0f0f0" stroke="#228833" stroke-width="1.5" filter="url(#lsmShadow)"/>
  <text x="300" y="280" text-anchor="middle" fill="#228833" font-size="13" font-weight="600">Level 1</text>
  <text x="300" y="300" text-anchor="middle" fill="#444444" font-size="10">~256 MB — sorted, non-overlapping SSTs</text>

  <!-- Arrow: compaction -->
  <line x1="300" y1="315" x2="300" y2="345" stroke="#0077bb" stroke-width="2" marker-end="url(#lsmArrow)"/>
  <text x="390" y="335" fill="#cc7700" font-size="10" font-weight="600">↓ compaction</text>

  <!-- Level 2 -->
  <rect x="80" y="350" width="440" height="55" rx="8" fill="#f0f0f0" stroke="#cc2244" stroke-width="1.5" filter="url(#lsmShadow)"/>
  <text x="300" y="375" text-anchor="middle" fill="#cc2244" font-size="13" font-weight="600">Level 2</text>
  <text x="300" y="393" text-anchor="middle" fill="#444444" font-size="10">~2.5 GB — each level ~10× larger</text>

  <!-- Arrow -->
  <line x1="300" y1="405" x2="300" y2="425" stroke="#0077bb" stroke-width="2" marker-end="url(#lsmArrow)"/>

  <!-- Level 3 -->
  <rect x="60" y="430" width="480" height="50" rx="8" fill="#f0f0f0" stroke="#cc2244" stroke-width="1" opacity="0.7" filter="url(#lsmShadow)"/>
  <text x="300" y="455" text-anchor="middle" fill="#cc2244" font-size="13" font-weight="600" opacity="0.8">Level 3</text>
  <text x="300" y="472" text-anchor="middle" fill="#444444" font-size="10">~25 GB ... can grow to hundreds of GB per subtask</text>

  <!-- Size scale on right -->
  <text x="555" y="95" fill="#888888" font-size="9" text-anchor="end">50 MB</text>
  <text x="555" y="192" fill="#888888" font-size="9" text-anchor="end">256 MB</text>
  <text x="555" y="287" fill="#888888" font-size="9" text-anchor="end">256 MB</text>
  <text x="555" y="382" fill="#888888" font-size="9" text-anchor="end">2.5 GB</text>
  <text x="555" y="458" fill="#888888" font-size="9" text-anchor="end">25 GB</text>

  <!-- Visual size bars -->
  <rect x="565" y="78" width="10" height="40" rx="3" fill="#0077bb" opacity="0.3"/>
  <rect x="565" y="170" width="15" height="40" rx="3" fill="#cc7700" opacity="0.3"/>
  <rect x="565" y="265" width="15" height="40" rx="3" fill="#228833" opacity="0.3"/>
  <rect x="565" y="360" width="25" height="40" rx="3" fill="#cc2244" opacity="0.3"/>
  <rect x="565" y="440" width="30" height="40" rx="3" fill="#cc2244" opacity="0.2"/>
</svg>