<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <filter id="tmShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" rx="12" fill="none"/>

  <!-- Title -->
  <rect x="20" y="15" width="740" height="42" rx="8" fill="#e8edf2" stroke="#0077bb" stroke-width="1.5"/>
  <text x="390" y="42" text-anchor="middle" fill="#0077bb" font-size="15" font-weight="700">TaskManager Pod 3 — 10 GB Total Memory</text>

  <!-- JVM Heap Section -->
  <rect x="30" y="75" width="720" height="180" rx="10" fill="#f5f5f5" stroke="#cc7700" stroke-width="1.5" filter="url(#tmShadow)"/>
  <text x="50" y="98" fill="#cc7700" font-size="14" font-weight="700">JVM Heap</text>

  <!-- Framework Heap -->
  <rect x="50" y="110" width="320" height="60" rx="8" fill="#f0f0f0" stroke="#cc7700" stroke-width="1" opacity="0.8"/>
  <text x="210" y="133" text-anchor="middle" fill="#cc7700" font-size="12" font-weight="600">Framework Heap ~400 MB</text>
  <text x="210" y="150" text-anchor="middle" fill="#444444" font-size="10">RPC, classloaders, logging</text>
  <text x="210" y="163" text-anchor="middle" fill="#666666" font-size="9">Flink's internal machinery</text>

  <!-- Task Heap -->
  <rect x="390" y="110" width="340" height="130" rx="8" fill="#f0f0f0" stroke="#cc7700" stroke-width="1" opacity="0.8"/>
  <text x="560" y="133" text-anchor="middle" fill="#cc7700" font-size="12" font-weight="600">Task Heap ~2 GB</text>
  <text x="560" y="152" text-anchor="middle" fill="#444444" font-size="10">User-defined functions' Java objects</text>
  <text x="560" y="168" text-anchor="middle" fill="#444444" font-size="10">and broadcast state</text>
  <text x="560" y="186" text-anchor="middle" fill="#666666" font-size="9">Garbage-collected normally by the JVM</text>

  <!-- Network Memory Section -->
  <rect x="30" y="270" width="720" height="80" rx="10" fill="#f5f5f5" stroke="#0077bb" stroke-width="1.5" filter="url(#tmShadow)"/>
  <text x="50" y="298" fill="#0077bb" font-size="14" font-weight="700">Network Memory ~1 GB</text>
  <text x="320" y="298" fill="#0077bb" font-size="10" opacity="0.7">— off-heap, pre-allocated at startup</text>
  <text x="50" y="318" fill="#444444" font-size="10">Fixed-size 32 KB buffer segments for records traveling between operators.</text>
  <rect x="570" y="282" width="160" height="28" rx="14" fill="#e6f0f8" stroke="#0077bb" stroke-width="1"/>
  <text x="650" y="300" text-anchor="middle" fill="#0077bb" font-size="10" font-weight="600">SHARED across slots</text>
  <text x="50" y="338" fill="#666666" font-size="9">Buffers flow dynamically to wherever demand is highest</text>

  <!-- Managed Memory Section -->
  <rect x="30" y="365" width="720" height="140" rx="10" fill="#f5f5f5" stroke="#228833" stroke-width="1.5" filter="url(#tmShadow)"/>
  <text x="50" y="393" fill="#228833" font-size="14" font-weight="700">Managed Memory ~5 GB</text>
  <text x="310" y="393" fill="#228833" font-size="10" opacity="0.7">— off-heap, outside the JVM's control</text>
  <text x="50" y="415" fill="#444444" font-size="10">Raw OS memory the JVM doesn't know about. Flink tracks it with atomic counters.</text>
  <text x="50" y="433" fill="#444444" font-size="10">This is where RocksDB lives.</text>

  <!-- Slot partitions -->
  <rect x="60" y="448" width="325" height="44" rx="6" fill="#eef8ee" stroke="#228833" stroke-width="1"/>
  <text x="222" y="468" text-anchor="middle" fill="#228833" font-size="11" font-weight="600">Slot 4: ~2.5 GB</text>
  <text x="222" y="483" text-anchor="middle" fill="#666666" font-size="9">Isolated — cannot borrow from Slot 5</text>

  <rect x="405" y="448" width="325" height="44" rx="6" fill="#eef8ee" stroke="#228833" stroke-width="1"/>
  <text x="567" y="468" text-anchor="middle" fill="#228833" font-size="11" font-weight="600">Slot 5: ~2.5 GB</text>
  <text x="567" y="483" text-anchor="middle" fill="#666666" font-size="9">Isolated — cannot borrow from Slot 4</text>

  <!-- Divider between slots -->
  <line x1="393" y1="452" x2="393" y2="488" stroke="#cc2244" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="393" y="500" text-anchor="middle" fill="#cc2244" font-size="8" font-weight="600">HARD PARTITION</text>
</svg>